services:
  zookeeper:
    image: wurstmeister/zookeeper
    ports:
      - "2181:2181"
    networks:
      - easycab_network

  kafka:
    image: wurstmeister/kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_HOST_NAME: localhost
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INSIDE://0.0.0.0:9092,OUTSIDE://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:9092,OUTSIDE://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_CREATE_TOPICS: "taxi_updates:1:1,customer_updates:1:1,map_updates:1:1,taxi_commands:1:1"
    networks:
      - easycab_network
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --list --bootstrap-server localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  mysql:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: JAHEDE11
      MYSQL_DATABASE: easycab
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./initial_data.sql:/docker-entrypoint-initdb.d/2-initial_data.sql
    networks:
      - easycab_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  ec_central:
    build:
      context: .
      dockerfile: Dockerfile.central
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MYSQL_HOST: mysql
    networks:
      - easycab_network
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy

  ec_gui:
    build:
      context: .
      dockerfile: Dockerfile.gui
    ports:
      - "8080:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - easycab_network
    depends_on:
      - kafka

  ec_customer_1:
    build:
      context: .
      dockerfile: Dockerfile.customer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - easycab_network
    depends_on:
      - kafka

  ec_de:
    build:
      context: .
      dockerfile: Dockerfile.de
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CENTRAL_HOST: ec_central
      MYSQL_HOST: mysql
      MYSQL_DB: easycab
      MYSQL_USER: root
      MYSQL_PASSWORD: JAHEDE11
      MYSQL_PORT: 3306
    networks:
      - easycab_network
    depends_on:
      - kafka
      - ec_central

  ec_customer_2:
    build:
      context: .
      dockerfile: Dockerfile.customer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - easycab_network
    depends_on:
      - kafka

  ec_de_1:
    build:
      context: .
      dockerfile: Dockerfile.de
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CENTRAL_HOST: ec_central
    networks:
      - easycab_network
    depends_on:
      - kafka
      - ec_central

  ec_de_2:
    build:
      context: .
      dockerfile: Dockerfile.de
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CENTRAL_HOST: ec_central
    networks:
      - easycab_network
    depends_on:
      - kafka
      - ec_central

  ec_s_1:
    build:
      context: .
      dockerfile: Dockerfile.ec_s
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CENTRAL_HOST: ec_central
    networks:
      - easycab_network
    depends_on:
      - kafka
      - ec_central

  ec_s_2:
    build:
      context: .
      dockerfile: Dockerfile.ec_s
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CENTRAL_HOST: ec_central
    networks:
      - easycab_network
    depends_on:
      - kafka
      - ec_central

networks:
  easycab_network:
    driver: bridge