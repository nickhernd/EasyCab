version: '3'
services:
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: easycabpass
      MYSQL_DATABASE: easycab
      MYSQL_USER: easycab_user
      MYSQL_PASSWORD: easycab123
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - easycab_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: wurstmeister/kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${HOST_IP}:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CREATE_TOPICS: "customerrequests:1:1,centralresponses:1:1,taxistatus:1:1,taxiinstructions:1:1"
    depends_on:
      - zookeeper
    networks:
      - easycab_network

  zookeeper:
    image: wurstmeister/zookeeper
    ports:
      - "2181:2181"
    networks:
      - easycab_network

  central:
    build:
      context: .
      dockerfile: Dockerfile
    command: python /app/EC_Central.py 8000 ${HOST_IP}:9092 mysql easycab_user easycab123
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BROKER=${HOST_IP}:9092
      - DB_HOST=mysql
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - easycab_network

  gui:
    build:
      context: .
      dockerfile: Dockerfile
    command: python /app/EC_gui.py
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    network_mode: "host"

volumes:
  mysql_data:

networks:
  easycab_network:
    driver: bridge