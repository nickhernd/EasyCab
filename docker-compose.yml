version: '3'

services:
  central:
    build: 
      context: ./core/central
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - KAFKA_BROKER=kafka:9092
      - DB_HOST=mysql
      - DB_PORT=3306
    depends_on:
      - kafka
      - mysql

  customer:
    build: 
      context: ./customer
      dockerfile: Dockerfile
    environment:
      - KAFKA_BROKER=kafka:9092
      - CUSTOMER_ID=1
    depends_on:
      - kafka

  kafka:
    image: wurstmeister/kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_HOST_NAME: kafka
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    depends_on:
      - zookeeper

  zookeeper:
    image: wurstmeister/zookeeper
    ports:
      - "2181:2181"

  mysql:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: easycab
    volumes:
      - ./core/data_base/init.sql:/docker-entrypoint-initdb.d/init.sql

  gui:
    build: 
      context: ./gui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://central:8080
    depends_on:
      - central

  kafka-init:
    image: wurstmeister/kafka
    depends_on:
      - kafka
    volumes:
      - ./kafka-init.sh:/kafka-init.sh
    command: ["sh", "-c", "chmod +x /kafka-init.sh && /kafka-init.sh"]