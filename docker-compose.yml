version: '3'
services:
  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: easycabpass
      MYSQL_DATABASE: easycab
      MYSQL_USER: easycab_user
      MYSQL_PASSWORD: easycab123
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - easycab_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: wurstmeister/zookeeper
    ports:
      - "2181:2181"
    networks:
      - easycab_network

  kafka:
    image: wurstmeister/kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CREATE_TOPICS: "customerrequests:1:1,centralresponses:1:1,taxistatus:1:1,taxiinstructions:1:1,sensordata:1:1"
    depends_on:
      - zookeeper
    networks:
      - easycab_network

  central:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      python EC_Central.py
      --port 8000
      --kafka kafka:9092
      --db-host mysql
      --db-user easycab_user
      --db-password easycab123
      --db-name easycab
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - easycab_network

  taxi1:
    build:
      context: .
      dockerfile: Dockerfile
    command: python /app/EC_DE.py
    ports:
      - "5000:5000"
    environment:
      - KAFKA_BROKER=kafka:9092
      - TAXI_ID=1
      - SENSOR_PORT=5000
    depends_on:
      - kafka
      - central
    networks:
      - easycab_network

  taxi2:
    build:
      context: .
      dockerfile: Dockerfile
    command: python /app/EC_DE.py
    ports:
      - "5001:5000"
    environment:
      - KAFKA_BROKER=kafka:9092
      - TAXI_ID=2
      - SENSOR_PORT=5000
    depends_on:
      - kafka
      - central
    networks:
      - easycab_network

  sensors1:
    build:
      context: .
      dockerfile: Dockerfile
    command: python /app/EC_S.py
    environment:
      - TAXI_ID=1
      - DIGITAL_ENGINE_HOST=taxi1
      - DIGITAL_ENGINE_PORT=5000
    depends_on:
      - taxi1
    networks:
      - easycab_network

  sensors2:
    build:
      context: .
      dockerfile: Dockerfile
    command: python /app/EC_S.py
    environment:
      - TAXI_ID=2
      - DIGITAL_ENGINE_HOST=taxi2
      - DIGITAL_ENGINE_PORT=5000
    depends_on:
      - taxi2
    networks:
      - easycab_network

networks:
  easycab_network:
    driver: bridge

volumes:
  mysql_data: