version: '3'
services:
  zookeeper:
    image: wurstmeister/zookeeper
    ports:
      - "2181:2181"
    networks:
      - easycab_network

  kafka:
    image: wurstmeister/kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CREATE_TOPICS: "customerrequests:1:1,centralresponses:1:1,taxistatus:1:1,taxiinstructions:1:1"
    depends_on:
      - zookeeper
    networks:
      - easycab_network

  central:
    build:
      context: .
      dockerfile: Dockerfile
    command: python /app/EC_Central.py
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka
    networks:
      - easycab_network

  taxi1:
    build:
      context: .
      dockerfile: Dockerfile
    command: python /app/EC_DE.py
    environment:
      - KAFKA_BROKER=kafka:9092
      - TAXI_ID=1
    depends_on:
      - kafka
      - central
    networks:
      - easycab_network

  taxi2:
    build:
      context: .
      dockerfile: Dockerfile
    command: python /app/EC_DE.py
    environment:
      - KAFKA_BROKER=kafka:9092
      - TAXI_ID=2
    depends_on:
      - kafka
      - central
    networks:
      - easycab_network

  customer:
    build:
      context: .
      dockerfile: Dockerfile
    command: python /app/EC_Customer.py
    environment:
      - KAFKA_BROKER=kafka:9092
      - CUSTOMER_ID=1
    depends_on:
      - kafka
      - central
    networks:
      - easycab_network

networks:
  easycab_network:
    driver: bridge